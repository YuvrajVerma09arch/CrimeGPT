# Alembic configuration for the CrimeGPT backend.
#
# No initial migration is committed: dev/demo environments create tables via
# app.database.init_db() at startup. Generate the baseline revision with:
#   alembic revision --autogenerate -m "baseline"

[alembic]
script_location = alembic

# Make `app` importable when alembic is run from backend/
prepend_sys_path = .

# Placeholder only — alembic/env.py overrides this at runtime from
# app.config.settings.database_url (env var DATABASE_URL / .env).
sqlalchemy.url = sqlite+aiosqlite:///./crimegpt.db

# Template used to generate migration file names
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# e.g. run black on newly generated revisions:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
