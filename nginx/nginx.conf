# CrimeGPT nginx config (mounted at /etc/nginx/conf.d/default.conf)

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # React static build — the frontend_dist named volume is mounted at
    # /usr/share/nginx/html by docker-compose.prod.yml.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health probe passthrough
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ACME challenge webroot for certbot (uncomment with the volume mount)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }
}

